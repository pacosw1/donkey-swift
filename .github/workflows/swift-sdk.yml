name: Generate Swift SDK

on:
  push:
    branches: [main]
    paths:
      - "packages/donkeygo/src/app/openapi.ts"

jobs:
  generate:
    name: Generate Swift Client
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm --filter donkeygo build

      - name: Extract OpenAPI spec
        run: |
          node -e "
            import('./packages/donkeygo/dist/app/openapi.js')
              .then(m => process.stdout.write(JSON.stringify(m.openApiSpec(), null, 2)))
          " > openapi.json

      - name: Install swift-openapi-generator
        run: |
          brew install swift-openapi-generator || true

      - name: Generate Swift client
        run: |
          mkdir -p swift-sdk/Sources/GeneratedClient
          swift-openapi-generator generate \
            --mode types \
            --mode client \
            --output-directory swift-sdk/Sources/GeneratedClient \
            openapi.json

      - name: Push to Swift SDK repo
        env:
          SWIFT_SDK_REPO_TOKEN: ${{ secrets.SWIFT_SDK_REPO_TOKEN }}
          SWIFT_SDK_REPO: ${{ secrets.SWIFT_SDK_REPO }}
        run: |
          if [ -z "$SWIFT_SDK_REPO" ] || [ -z "$SWIFT_SDK_REPO_TOKEN" ]; then
            echo "SWIFT_SDK_REPO or SWIFT_SDK_REPO_TOKEN not set, skipping push"
            exit 0
          fi

          cd swift-sdk
          git init
          git remote add origin "https://x-access-token:${SWIFT_SDK_REPO_TOKEN}@github.com/${SWIFT_SDK_REPO}.git"
          git fetch origin main || true
          git checkout -b update-sdk-${{ github.sha }}

          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update generated Swift client from ${{ github.sha }}"

          git push origin update-sdk-${{ github.sha }}

          gh pr create \
            --repo "$SWIFT_SDK_REPO" \
            --title "Update Swift SDK from donkeygo-ts" \
            --body "Auto-generated from commit ${{ github.sha }}" \
            --base main \
            --head update-sdk-${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.SWIFT_SDK_REPO_TOKEN }}
