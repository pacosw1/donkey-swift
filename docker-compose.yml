services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://donkeygo:donkeygo@db:5432/donkeygo
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - APPLE_BUNDLE_ID=${APPLE_BUNDLE_ID:-com.example.app}
      - ADMIN_KEY=${ADMIN_KEY:-admin-dev-key}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: donkeygo
      POSTGRES_USER: donkeygo
      POSTGRES_PASSWORD: donkeygo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donkeygo"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
